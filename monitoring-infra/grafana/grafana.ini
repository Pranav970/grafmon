[server]
protocol = http
http_port = 3000
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
# Admin credentials are injected via GF_SECURITY_ADMIN_USER / GF_SECURITY_ADMIN_PASSWORD env vars.
# Do not hardcode credentials here.
disable_gravatar = true
cookie_secure = false
cookie_samesite = lax

[users]
# Prevent anonymous sign-up; only the admin can create accounts
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[auth]
disable_login_form = false

[dashboards]
default_home_dashboard_path =

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
mode = console
level = warn

[alerting]
enabled = false

[unified_alerting]
enabled = true
