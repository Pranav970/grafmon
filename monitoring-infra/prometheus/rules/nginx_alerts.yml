groups:
  - name: nginx_alerts
    interval: 30s
    rules:

      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Nginx is down on {{ $labels.instance }}"
          description: "The nginx-prometheus-exporter has been unreachable for more than 1 minute. Nginx may have crashed."
          runbook: "Run `docker logs nginx-proxy --tail=50` to inspect recent errors. Restart with `docker compose restart nginx`."

      - alert: NginxHighActiveConnections
        expr: nginx_connections_active > 500
        for: 2m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High active connections on {{ $labels.instance }}"
          description: "Nginx active connections: {{ $value }} (threshold: 500). This may indicate a traffic surge or slow upstream."
          runbook: "Check upstream app health. Review `nginx_connections_waiting` — high waiting may mean keep-alive saturation."

      - alert: NginxConnectionsDropping
        expr: rate(nginx_connections_accepted[5m]) - rate(nginx_connections_handled[5m]) > 0
        for: 2m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Nginx is dropping connections on {{ $labels.instance }}"
          description: "Accepted connections exceed handled connections — Nginx is dropping requests. worker_connections limit may be reached."
          runbook: "Increase `worker_connections` in nginx.conf and reload: `docker exec nginx-proxy nginx -s reload`"

      - alert: NginxNoRequests
        expr: rate(nginx_http_requests_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Nginx receiving zero requests on {{ $labels.instance }}"
          description: "No HTTP requests have been received in the last 5 minutes. This may be normal in dev, but unexpected in production."
          runbook: "Verify that upstream load balancer / DNS is routing traffic to this instance."
