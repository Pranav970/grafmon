worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /dev/stdout main;
  error_log  /dev/stderr warn;

  sendfile        on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  upstream target_app {
    server app:3000;
    keepalive 32;
  }

  # ── Public server (proxies to Node app) ──────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Block public access to the /metrics endpoint.
    # Prometheus scrapes app:3000/metrics directly inside the Docker network.
    location = /metrics {
      deny all;
      return 403;
    }

    location / {
      proxy_pass         http://target_app;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
    }

    location /nginx-health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }
  }

  # ── Internal metrics server (never exposed outside Docker network) ────────────
  server {
    listen 8081;
    server_name _;

    access_log off;

    location /stub_status {
      stub_status;
    }

    location / {
      return 404;
    }
  }
}
